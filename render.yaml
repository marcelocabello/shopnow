databases:
  - name: shopnow-postgres
    databaseName: shopnow
    user: shopnow_user
    plan: free

services:

  - type: web
    name: shopnow-clientes
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn serv_clientes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHOPNOW_STORAGE
        value: postgres
      - key: SHOPNOW_SEED_DEMO
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: shopnow-postgres
          property: connectionString
      - key: RABBITMQ_HOST
        value: beaver.rmq.cloudamqp.com
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        value: dbyjxysd
